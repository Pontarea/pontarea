<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64" fill="none">
  <!-- Background -->
  <rect width="64" height="64" rx="12" fill="#0a3d6b"/>

  <!-- Main sail (white, left-leaning triangle) -->
  <path d="M31 9 L31 43 L12 43 Z" fill="white" opacity="0.95"/>

  <!-- Jib sail (blue, right-leaning triangle) -->
